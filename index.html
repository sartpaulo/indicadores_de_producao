<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Essenza — Gestão de Indicadores</title></head><body><p style="font-family:system-ui;padding:24px">Carregando Gestão de Indicadores…</p><script>
(async()=>{
  const files=['assets/app.part01.b64','assets/app.part02.b64','assets/app.part03.b64','assets/app.part04.b64','assets/app.part05.b64','assets/app.part06.b64','assets/app.part07.b64','assets/app.part08.b64','assets/app.part09.b64'];
  const parts=await Promise.all(files.map(f=>fetch(f).then(r=>{if(!r.ok)throw new Error(f);return r.text()})));
  const bin=atob(parts.join(''));
  const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
  const html=new TextDecoder('utf-8').decode(bytes);
  document.open();document.write(html);document.close();
})().catch(e=>{document.body.innerHTML='<pre style="color:#b91c1c;padding:24px">Erro ao carregar o aplicativo: '+e+'</pre>'});
</script></body></html>
